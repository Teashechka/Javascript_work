<!DOCTYPE html>
<html>
  <head>
    <style>
      img {
        width: 200px;
        height: 200px;
      }
    </style>
    <script>
      function displ(id) {
        let p = document.getElementById(id);
        if (p.style.display === "none") {
          p.style.display = "block";
        } else {
          p.style.display = "none";
        }
      }
    </script>
  </head>
  <body>
    <p>
      <img src="fmkto.jpg" id="fmkto" /> <br /><br />
      <input type="button" value="Відобразити / сховати рисунок" onclick="displ('fmkto');" />
    </p>
    <div>
      <img src="fmkto1.jpg" id="fmkto1" /> <br /><br />
      <input type="button" value="Відобразити / сховати рисунок" onclick="displ('fmkto1');" />
    </div>
  </body>
</html>
