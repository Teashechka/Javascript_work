<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Калькулятор</title>
</head>
<body>
    <h1>Калькулятор</h1>
    <button onclick="runCalculator()">Запустити обчислення</button>
    <br><br>
    <a href="index.html">← Повернутися на головну</a>
    <script>
        function runCalculator() {
            const xInput = prompt("Введіть перше число (x):");
            const yInput = prompt("Введіть друге число (y):");
            const operator = prompt("Введіть арифметичну операцію (+, -, *, /):");
            
            const x = parseFloat(xInput);
            const y = parseFloat(yInput);

            if (isNaN(x) || isNaN(y)) {
                alert("Помилка: введені дані не є числами!");
            } else {
                let result;
                let isValid = true;
                switch (operator) {
                    case '+': result = x + y; break;
                    case '-': result = x - y; break;
                    case '*': result = x * y; break;
                    case '/':
                        if (y === 0) {
                            alert("Помилка: ділення на нуль!");
                            isValid = false;
                        } else {
                            result = x / y;
                        }
                        break;
                    default:
                        alert("Помилка: невірний оператор!");
                        isValid = false;
                }
                if (isValid) alert("Результат: " + result);
            }
        }
    </script>
</body>
</html>
